      border-radius: 8px;
      padding: 1rem 1.1rem;
      overflow-x: auto;

      color: #cbd5e1;
      border: none;
      padding: 0;

<script type="text/x-markdown" id="source">
# Login Process

This document walks through what happens when a user logs in to the starter kit, from the moment they hit `/login` to the moment they land on `/dashboard`. It assumes familiarity with Laravel and Vue but does not assume prior experience with Fortify or Inertia.

## The moving parts

- **Laravel Fortify** — a headless auth backend. It registers all the auth routes (`/login`, `/logout`, `/register`, `/forgot-password`, etc.) and runs the credential-checking pipeline. It does **not** ship any UI.
- **Inertia.js v3** — the glue between Laravel and Vue. Server-side, `Inertia::render('Auth/Login')` returns a JSON payload pointing at a Vue page; client-side, Inertia swaps Vue components without a full page reload.
- **Vue 3 + Tailwind 4 + daisyUI 5** — the UI. The auth pages live in `resources/js/Pages/Auth/`.
- **Ziggy** — exposes Laravel's named routes to JavaScript, so the Vue code can call `route('login')` instead of hard-coding `/login`.

Configuration highlights:

- `config/fortify.php:18` — guard is `web` (standard session auth)
- `config/fortify.php:76` — successful login redirects to `/dashboard`
- `config/fortify.php:164` — registration, password reset, and email verification are enabled (2FA is not)

## Step 1 — Rendering the login page

When the user visits `/login`, Fortify intercepts that route. Instead of returning a Blade view, it runs the closure registered in `app/Providers/FortifyServiceProvider.php:40`:

```php
Fortify::loginView(fn () => Inertia::render('Auth/Login', [
    'canResetPassword' => Features::enabled(Features::resetPasswords()),
    'status' => session('status'),
]));
```

Inertia returns the `Auth/Login` Vue page (`resources/js/Pages/Auth/Login.vue`) with two props. The page renders inside `GuestLayout` and uses daisyUI form controls.

## Step 2 — Submitting the form

`Login.vue` uses Inertia's `useForm` composable to hold form state:

```js
const form = useForm({ email: '', password: '', remember: false })

const submit = () => {
    form.post(route('login'), {
        onFinish: () => form.reset('password'),
    })
}
```

When the user submits, `form.post(route('login'), …)` sends an XHR `POST` to `/login` with:

- The form fields as JSON
- An `X-Inertia: true` header (tells Laravel to return an Inertia JSON response, not full HTML)
- The CSRF token (read automatically from the `XSRF-TOKEN` cookie)

While the request is in flight, `form.processing` is `true`, which `PrimaryButton` reads to show a loading state.

## Step 3 — Fortify authenticates the request

The `POST /login` route hits Fortify's `AuthenticatedSessionController`, which runs two layers:

**Rate limiting.** Before validation, Fortify checks the `login` limiter defined in `FortifyServiceProvider.php:62` — 5 attempts per minute per email+IP combination. Exceeding it returns a 429.

**Authentication pipeline.** A series of actions runs in order:

1. `EnsureLoginIsNotThrottled`
2. `RedirectIfTwoFactorAuthenticatable` — no-op here since 2FA is disabled
3. `AttemptToAuthenticate` — calls `Auth::guard('web')->attempt([...], $remember)`, which looks up the user by email (lowercased — see `config/fortify.php:63`) and verifies the password against the bcrypt hash
4. `PrepareAuthenticatedSession` — regenerates the session ID to prevent fixation, and (if `remember` was checked) sets a long-lived remember-me cookie

**On failure**, a `ValidationException` is thrown, Laravel returns 422 with `{ errors: { email: '…' } }`, Inertia populates `form.errors`, and the `<InputError>` component renders the message under the email field.

**On success**, Fortify returns a redirect to `/dashboard`.

## Step 4 — Inertia turns the redirect into a SPA navigation

A normal Laravel 302 would cause the browser to do a full GET. Inertia changes that:

- After a non-GET request, Inertia upgrades the 302 to a **303 See Other** so the follow-up is guaranteed to be a GET (not a re-POST).
- The Inertia client intercepts the redirect and issues an XHR GET to `/dashboard` with `X-Inertia: true`.
- Laravel routes `/dashboard` through the `auth` + `verified` middleware (`routes/web.php:9`). The session cookie now identifies the just-authenticated user, so `auth` lets it through. `verified` checks `users.email_verified_at`; if the email isn't verified yet, the user is redirected to `Auth/VerifyEmail.vue`.
- The route closure returns `Inertia::render('Dashboard')`. Inertia's response middleware also runs `HandleInertiaRequests::share()` (`app/Http/Middleware/HandleInertiaRequests.php:36`), which attaches a global `auth.user` prop with `{ id, name, email }` so any Vue page can read the current user via `usePage().props.auth.user`.
- The browser receives JSON describing the new page, Inertia swaps the Vue component, and updates the URL via the History API — no full page reload.

## Step 5 — Staying logged in

Every subsequent request carries the encrypted session cookie. The `auth` middleware on `/dashboard` and the `/settings/*` group (`routes/web.php:9`) gates protected pages. Sensitive actions — like changing the password or deleting the account (`routes/web.php:17`) — additionally require re-entering the current password via Laravel's `current_password` rule, and Fortify can bounce the user to `Auth/ConfirmPassword.vue` when a "recently confirmed" window has expired.

Logout posts to the named `logout` route (also auto-registered by Fortify), which invalidates the session, rotates the CSRF token, and redirects to `/`.

## Quick reference

| Concern | File |
| --- | --- |
| Wire Fortify views to Inertia pages, define rate limiters | `app/Providers/FortifyServiceProvider.php` |
| Login page UI | `resources/js/Pages/Auth/Login.vue` |
| Guard, redirect target, enabled features | `config/fortify.php` |
| Protected routes (`auth` + `verified` middleware) | `routes/web.php` |
| Share `auth.user` with all Inertia pages | `app/Http/Middleware/HandleInertiaRequests.php` |
| User creation / password update actions | `app/Actions/Fortify/*` |

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  marked.use({ gfm: true });

  function processMarkdown(raw) {
    const lines = raw.trim().split('\n');
    let sections = [];
    let current = null;

    for (const line of lines) {
      if (/^# /.test(line)) continue;
      if (/^## /.test(line)) {
        if (current) sections.push(current);
        current = { heading: line.slice(3).trim(), lines: [] };
        continue;
      }
      if (current) current.lines.push(line);
    }
    if (current) sections.push(current);
    return sections;
  }

  function splitSubsections(lines) {
    const result = [];
    let currentHeading = null;
    let currentLines = [];

    for (const line of lines) {
      if (/^### /.test(line)) {
        if (currentLines.length > 0 || currentHeading !== null) {
          result.push({ heading: currentHeading, lines: currentLines });
        }
        currentHeading = line.slice(4).trim();
        currentLines = [];
      } else {
        currentLines.push(line);
      }
    }
    if (currentLines.length > 0 || currentHeading !== null) {
      result.push({ heading: currentHeading, lines: currentLines });
    }
    return result;
  }

  function render() {
    const raw = document.getElementById('source').textContent;
    const sections = processMarkdown(raw);
    const app = document.getElementById('app');

    let html = '';
    for (const s of sections) {
      const headingHtml = marked.parseInline(s.heading);
      const subsections = splitSubsections(s.lines);

      let bodyHtml = '';
      for (const sub of subsections) {
        if (sub.heading === null) {
          bodyHtml += marked.parse(sub.lines.join('\n'));
        } else {
          const subHeadingHtml = marked.parseInline(sub.heading);
          const subBodyHtml = marked.parse(sub.lines.join('\n'));
          bodyHtml += `
            <details class="subsection">
              <summary>${subHeadingHtml}</summary>
              <div class="subsection-body">${subBodyHtml}</div>
            </details>`;
        }
      }

      html += `
        <details class="section">
          <summary>${headingHtml}</summary>
          <div class="section-body">${bodyHtml}</div>
        </details>`;
    }
    app.innerHTML = html;
  }

  function expandAll()  { document.querySelectorAll('details').forEach(d => d.open = true); }
  function collapseAll() { document.querySelectorAll('details').forEach(d => d.open = false); }

  render();
</script>
